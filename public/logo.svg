<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 48" fill="none">
    <defs>
        <linearGradient id="logoGrad" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
            <stop stop-color="#2563eb"/>
            <stop offset="1" stop-color="#1e40af"/>
        </linearGradient>
    </defs>

    <!-- Icon box -->
    <rect width="48" height="48" rx="10" fill="url(#logoGrad)"/>

    <!-- Car body -->
    <rect x="7" y="26" width="34" height="12" rx="2" fill="white"/>

    <!-- Car roof / cabin -->
    <path d="M12 26 L16 17 L32 17 L36 26 Z" fill="white"/>

    <!-- Windshields -->
    <path d="M17 17.5 L15 25 L23 25 L23 17.5 Z" fill="#1e40af" fill-opacity="0.45" rx="1"/>
    <path d="M23 17.5 L23 25 L33 25 L31 17.5 Z" fill="#1e40af" fill-opacity="0.45"/>

    <!-- Front/rear bumper lines -->
    <rect x="7" y="35" width="34" height="2" rx="1" fill="#dbeafe"/>

    <!-- Wheels -->
    <circle cx="15" cy="38" r="5" fill="#1e40af"/>
    <circle cx="15" cy="38" r="2.5" fill="white"/>
    <circle cx="33" cy="38" r="5" fill="#1e40af"/>
    <circle cx="33" cy="38" r="2.5" fill="white"/>

    <!-- Brand text -->
    <text
            x="58"
            y="22"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
            font-size="17"
            font-weight="700"
            fill="#111827"
            letter-spacing="-0.3">Rent a Car
    </text>

    <text
            x="59"
            y="38"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
            font-size="11"
            font-weight="400"
            fill="#6b7280"
            letter-spacing="0.2">Iznajmljivanje vozila
    </text>
</svg>

